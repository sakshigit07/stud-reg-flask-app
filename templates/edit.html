<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark text-center">
                        <h3 class="mb-0">Edit Student Record</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="/edit/{{ student.id }}">
                            <div class="mb-3">
                                <label class="form-label">Name *</label>
                                <input type="text" class="form-control" name="name" value="{{ student.name }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" name="email" value="{{ student.email }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone Number *</label>
                                <input type="tel" class="form-control" name="phone" value="{{ student.phone }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Course</label>
                                <input type="text" class="form-control" name="course" value="{{ student.course }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <text area class="form-control" name="address" rows="3">{{ student.address }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Emergency Contact No.</label>
                                <input type="text" class="form-control" name="contact" value="{{ student.contact }}">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Update Record</button>
                                <a href="/students" class="btn btn-outline-secondary">Cancel Changes</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
